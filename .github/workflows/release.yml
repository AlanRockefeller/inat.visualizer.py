name: Build and Release

# Builds standalone executables for Windows, macOS, and Linux whenever a
# version tag (e.g. v1.0.0) is pushed, then publishes them to a GitHub Release.
# You can also run it manually from the Actions tab via workflow_dispatch.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: iNat-Seasonal-Visualizer-Windows
            asset_glob: dist/iNat-Seasonal-Visualizer.exe
          - os: macos-latest
            artifact_name: iNat-Seasonal-Visualizer-macOS
            asset_glob: dist/iNat-Seasonal-Visualizer-macOS.zip
          - os: ubuntu-latest
            artifact_name: iNat-Seasonal-Visualizer-Linux
            asset_glob: dist/iNat-Seasonal-Visualizer-Linux.tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxkbcommon-x11-0 \
            libegl1 libgl1 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        shell: bash
        run: |
          pyinstaller --noconfirm --clean \
            --name "iNat-Seasonal-Visualizer" \
            --onefile --windowed \
            --add-data "splash_screen.jpg${{ runner.os == 'Windows' && ';' || ':' }}." \
            --collect-all pyinaturalist \
            --collect-submodules duckdb \
            visualizer.py

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          cd dist
          # --windowed produces a .app bundle on macOS; zip it for distribution.
          if [ -d "iNat-Seasonal-Visualizer.app" ]; then
            ditto -c -k --keepParent "iNat-Seasonal-Visualizer.app" "iNat-Seasonal-Visualizer-macOS.zip"
          else
            zip -j "iNat-Seasonal-Visualizer-macOS.zip" "iNat-Seasonal-Visualizer"
          fi

      - name: Package Linux binary
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar -czf "iNat-Seasonal-Visualizer-Linux.tar.gz" "iNat-Seasonal-Visualizer"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            Standalone builds of the iNaturalist Seasonal Visualizer for Windows, macOS, and Linux.

            **Note:** On first launch the app will offer to download the required
            data files (`observations.parquet`, ~1 GB, and `taxonomy.parquet`)
            into the working directory. An internet connection is needed for that
            one-time download.

            - **Windows:** download `iNat-Seasonal-Visualizer.exe` and run it.
            - **macOS:** download and unzip `iNat-Seasonal-Visualizer-macOS.zip`, then
              run the app (right-click → Open the first time, since it is unsigned).
            - **Linux:** download and extract `iNat-Seasonal-Visualizer-Linux.tar.gz`,
              then run the binary.
